<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-bar">
        <input type="text" id="search" placeholder="Search...">
        <div class="notifications">Notifications</div>
    </div>
    <div class="sidebar">
        <ul>
            <li data-page="dashboard">Dashboard</li>
            <li data-page="orders">Orders</li>
            <li data-page="inventory">Inventory</li>
            <li data-page="shipping">Shipping</li>
            <li data-page="warehouses">Warehouses</li>
            <li data-page="suppliers">Suppliers</li>
            <li data-page="reports">Reports</li>
            <li data-page="analytics">Analytics</li>
            <li data-page="settings">Settings</li>
            <li data-page="users">Users</li>
        </ul>
    </div>
    <div class="main-content">
        <div id="content">
            <!-- Dynamically loaded content will be injected here -->
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
